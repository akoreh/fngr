<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fngr — doubletap</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="shared/style.css">
  <style>
    .layout { display: flex; gap: 1.5rem; flex-wrap: wrap; }

    #scroll-container {
      width: 280px;
      height: 200px;
      overflow-y: scroll;
      border: 2px solid #504945;
      border-radius: 12px;
      background: #32302f;
    }
    #scroll-inner {
      height: 600px;
      padding: 1rem;
      color: #a89984;
      font-size: 0.85rem;
    }
    #scroll-target {
      width: 200px;
      height: 100px;
      margin-top: 1rem;
      background: #3c3836;
      border: 2px solid #504945;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a89984;
      user-select: none;
      touch-action: none;
    }
    #multi-target {
      width: 280px;
      height: 280px;
      background: #3c3836;
      border: 2px solid #504945;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #a89984;
      user-select: none;
      touch-action: none;
    }
    #no-tap-zone {
      width: 280px;
      height: 100px;
      background: #32302f;
      border: 2px solid #504945;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #665c54;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>doubletap</h1>
  <div class="layout">
    <div id="target" class="target">double-tap here</div>

    <div id="multi-target">tap + doubletap</div>

    <div id="scroll-container">
      <div id="scroll-inner">
        Scroll this container. The doubletap target below should still work.
        <div id="scroll-target">doubletap inside scroll</div>
        <p style="margin-top:200px">bottom of scroll</p>
      </div>
    </div>

    <div id="no-tap-zone">no recognizer here</div>
  </div>
  <div id="log"></div>
  <script type="module">
    import { doubleTap, DoubleTapRecognizer } from 'fngr/doubletap';
    import { TapRecognizer } from 'fngr/tap';
    import { Manager } from 'fngr';
    import { logEvent } from './shared/setup.ts';

    // Main target — doubletap only
    const target = document.getElementById('target');
    doubleTap(target, (e) => {
      logEvent('doubletap', {
        count: e.count,
        clientX: e.pointers[0]?.clientX,
        clientY: e.pointers[0]?.clientY,
      });
      target.classList.add('active');
      setTimeout(() => target.classList.remove('active'), 150);
    });

    // CustomEvent listener on main target
    target.addEventListener('fngr:doubletap', (e) => {
      logEvent('fngr:doubletap', { count: e.detail.count });
    });

    // Multi-target — tap + doubletap with arbitration
    const multiTarget = document.getElementById('multi-target');
    const multiMgr = new Manager(multiTarget);

    const multiDt = new DoubleTapRecognizer({
      onDoubletap: (e) => {
        logEvent('multi:doubletap', {
          count: e.count,
          clientX: e.pointers[0]?.clientX,
          clientY: e.pointers[0]?.clientY,
        });
        multiTarget.classList.add('active');
        setTimeout(() => multiTarget.classList.remove('active'), 150);
      },
      interval: 300,
    });

    const multiTap = new TapRecognizer({
      onTap: (e) => {
        logEvent('multi:tap', {
          count: e.count,
          clientX: e.pointers[0]?.clientX,
          clientY: e.pointers[0]?.clientY,
        });
      },
    });

    multiTap.requireFailureOf(multiDt);
    multiMgr.add(multiDt, { priority: 10 });
    multiMgr.add(multiTap);

    // Scroll container target — doubletap only
    const scrollTarget = document.getElementById('scroll-target');
    doubleTap(scrollTarget, (e) => {
      logEvent('scroll-doubletap', {
        count: e.count,
        clientX: e.pointers[0]?.clientX,
        clientY: e.pointers[0]?.clientY,
      });
    });
  </script>
</body>
</html>
