<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fngr — swipe</title>
    <link rel="icon" href="favicon.png" />
    <link rel="stylesheet" href="shared/style.css" />
    <style>
      .layout {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      #scroll-container {
        width: 280px;
        height: 200px;
        overflow-y: scroll;
        border: 2px solid #504945;
        border-radius: 12px;
        background: #32302f;
      }
      #scroll-inner {
        height: 600px;
        padding: 1rem;
        color: #a89984;
        font-size: 0.85rem;
      }
      #scroll-target {
        width: 200px;
        height: 100px;
        margin-top: 1rem;
        background: #3c3836;
        border: 2px solid #504945;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a89984;
        user-select: none;
        touch-action: none;
      }
      #horizontal-target {
        width: 280px;
        height: 280px;
        background: #3c3836;
        border: 2px solid #504945;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        color: #a89984;
        user-select: none;
        touch-action: none;
      }
      #no-tap-zone {
        width: 280px;
        height: 100px;
        background: #32302f;
        border: 2px solid #504945;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #665c54;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>swipe</h1>
    <div class="layout">
      <div id="target" class="target">swipe here</div>

      <div id="horizontal-target">horizontal only</div>

      <div id="scroll-container">
        <div id="scroll-inner">
          Scroll this container. The swipe target below should still work.
          <div id="scroll-target">swipe inside scroll</div>
          <p style="margin-top: 200px">bottom of scroll</p>
        </div>
      </div>

      <div id="no-tap-zone">no recognizer here</div>
    </div>
    <div id="log"></div>
    <script type="module">
      import { swipe, SwipeRecognizer } from 'fngr/swipe';
      import { Manager } from 'fngr';
      import { logEvent } from './shared/setup.ts';

      // Main target — all directions
      const target = document.getElementById('target');
      swipe(target, {
        onSwipe(e) {
          logEvent('swipe', {
            direction: e.direction,
            distance: Math.round(e.distance),
            velocity: e.velocity.toFixed(2),
            clientX: e.pointers[0]?.clientX,
            clientY: e.pointers[0]?.clientY,
          });
          target.classList.add('active');
          setTimeout(() => target.classList.remove('active'), 150);
        },
      });

      // CustomEvent listener
      target.addEventListener('fngr:swipe', (e) => {
        logEvent('fngr:swipe', { direction: e.detail.direction });
      });

      // Horizontal-only target
      const hTarget = document.getElementById('horizontal-target');
      swipe(hTarget, {
        direction: 'horizontal',
        onSwipe(e) {
          logEvent('h-swipe', {
            direction: e.direction,
            distance: Math.round(e.distance),
          });
          hTarget.classList.add('active');
          setTimeout(() => hTarget.classList.remove('active'), 150);
        },
      });

      // Scroll container target
      const scrollTarget = document.getElementById('scroll-target');
      swipe(scrollTarget, {
        onSwipe(e) {
          logEvent('scroll-swipe', {
            direction: e.direction,
            distance: Math.round(e.distance),
          });
        },
      });
    </script>
  </body>
</html>
