<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fngr — pinch</title>
    <link rel="icon" href="favicon.png" />
    <link rel="stylesheet" href="shared/style.css" />
    <style>
      .layout {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      #scroll-container {
        width: 280px;
        height: 200px;
        overflow-y: scroll;
        border: 2px solid #504945;
        border-radius: 12px;
        background: #32302f;
      }
      #scroll-inner {
        height: 600px;
        padding: 1rem;
        color: #a89984;
        font-size: 0.85rem;
      }
      #scroll-target {
        width: 200px;
        height: 100px;
        margin-top: 1rem;
        background: #3c3836;
        border: 2px solid #504945;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a89984;
        user-select: none;
        touch-action: none;
      }
      #no-recognizer-zone {
        width: 280px;
        height: 100px;
        background: #32302f;
        border: 2px solid #504945;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #665c54;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>pinch</h1>
    <div class="layout">
      <div id="target" class="target">pinch here</div>

      <div id="scroll-container">
        <div id="scroll-inner">
          Scroll this container. The pinch target below should still work.
          <div id="scroll-target">pinch inside scroll</div>
          <p style="margin-top: 200px">bottom of scroll</p>
        </div>
      </div>

      <div id="no-recognizer-zone">no recognizer here</div>
    </div>
    <div id="log"></div>
    <script type="module">
      import { pinch } from 'fngr/pinch';
      import { logEvent } from './shared/setup.ts';

      // Main target
      const target = document.getElementById('target');
      pinch(target, {
        onPinchstart(e) {
          logEvent('pinchstart', {
            scale: e.scale.toFixed(3),
            deltaScale: e.deltaScale.toFixed(3),
            center: { x: Math.round(e.center.x), y: Math.round(e.center.y) },
            isFirst: e.isFirst,
            isFinal: e.isFinal,
          });
          target.classList.add('active');
        },
        onPinchmove(e) {
          logEvent('pinchmove', {
            scale: e.scale.toFixed(3),
            deltaScale: e.deltaScale.toFixed(3),
            center: { x: Math.round(e.center.x), y: Math.round(e.center.y) },
          });
        },
        onPinchend(e) {
          logEvent('pinchend', {
            scale: e.scale.toFixed(3),
            deltaScale: e.deltaScale.toFixed(3),
            center: { x: Math.round(e.center.x), y: Math.round(e.center.y) },
            isFinal: e.isFinal,
          });
          target.classList.remove('active');
        },
        onPinchcancel(e) {
          logEvent('pinchcancel', {
            scale: e.scale.toFixed(3),
            deltaScale: e.deltaScale.toFixed(3),
            center: { x: Math.round(e.center.x), y: Math.round(e.center.y) },
            isFinal: e.isFinal,
          });
          target.classList.remove('active');
        },
      });

      // CustomEvent listeners
      target.addEventListener('fngr:pinchstart', (e) => {
        logEvent('fngr:pinchstart', {
          scale: e.detail.scale.toFixed(3),
          center: { x: Math.round(e.detail.center.x), y: Math.round(e.detail.center.y) },
        });
      });
      target.addEventListener('fngr:pinchmove', (e) => {
        logEvent('fngr:pinchmove', {
          scale: e.detail.scale.toFixed(3),
        });
      });
      target.addEventListener('fngr:pinchend', (e) => {
        logEvent('fngr:pinchend', {
          scale: e.detail.scale.toFixed(3),
        });
      });

      // Scroll container target
      const scrollTarget = document.getElementById('scroll-target');
      pinch(scrollTarget, {
        onPinchstart(e) {
          logEvent('scroll-pinchstart', {
            scale: e.scale.toFixed(3),
            center: { x: Math.round(e.center.x), y: Math.round(e.center.y) },
          });
        },
        onPinchmove(e) {
          logEvent('scroll-pinchmove', {
            scale: e.scale.toFixed(3),
          });
        },
        onPinchend(e) {
          logEvent('scroll-pinchend', {
            scale: e.scale.toFixed(3),
          });
        },
      });
    </script>
  </body>
</html>
