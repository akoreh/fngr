version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint"]
      testing:
        patterns: ["vitest", "@playwright/*", "@stryker-mutator/*"]
      build:
        patterns: ["tsup", "typescript", "vite", "vitepress"]
